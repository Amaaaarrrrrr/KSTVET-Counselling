<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>KSTVET Counselling Centre</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
    <script>
      // Fix for "Cannot set property fetch of #<Window> which has only a getter"
      // This error can occur in certain iframe environments where window.fetch is read-only.
      (function() {
        try {
          var originalFetch = window.fetch;
          Object.defineProperty(window, 'fetch', {
            configurable: true,
            enumerable: true,
            get: function() { return originalFetch; },
            set: function(v) { 
              console.warn('Attempted to override window.fetch. Ignoring to prevent TypeError.');
            }
          });
        } catch (e) {
          // If defineProperty fails, we can't do much, but at least we tried to pre-empt the error.
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
